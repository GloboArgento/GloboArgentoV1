<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globo Argento - Ingresar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex; align-items: center; justify-content: center;
            font-family: Arial, sans-serif;
        }
        .card {
            background: #fff; border-radius: 18px;
            padding: 36px 32px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: aparecer 0.4s ease;
        }
        @keyframes aparecer {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .logo     { text-align: center; font-size: 40px; margin-bottom: 6px; }
        .titulo   { text-align: center; font-size: 22px; font-weight: bold; color: #1a1a2e; margin-bottom: 4px; }
        .subtitulo{ text-align: center; font-size: 13px; color: #888; margin-bottom: 22px; }

        .pantalla { display: none; }
        .pantalla.activa { display: block; }

        .sep {
            display: flex; align-items: center; gap: 10px;
            color: #ccc; font-size: 13px; margin: 12px 0;
        }
        .sep::before, .sep::after { content:''; flex:1; height:1px; background:#e8e8e8; }

        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 11px 13px; font-size: 15px;
            border-radius: 10px; border: 1.5px solid #e0e0e0;
            margin-bottom: 10px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: #6c5ce7; }

        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; font-size: 15px; cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover  { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-morado { background: #6c5ce7; color: #fff; }
        .btn-gris   { background: #b2bec3; color: #fff; margin-top: 6px; }

        .link {
            background: none; border: none; color: #6c5ce7; font-size: 13px;
            cursor: pointer; text-decoration: underline;
            display: block; width: 100%; text-align: center; margin-top: 10px;
        }
        .link:hover { color: #5a4bd1; }
        .link-volver { color: #aaa; margin-top: 8px; }

        .msg-error { color: #e17055; font-size: 13px; margin-top: 6px; min-height: 18px; }
        .msg-ok    { color: #00b894; font-size: 13px; margin-top: 6px; min-height: 18px; }
        .msg-aviso { color: #aaa;    font-size: 12px; margin-top: 6px; text-align: center; }

        .pass-wrapper { position: relative; margin-bottom: 10px; }
        .pass-wrapper input { width: 100%; margin-bottom: 0; padding-right: 42px; }
        .pass-wrapper .ojito {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            font-size: 18px; color: #aaa; padding: 0; line-height: 1;
        }
        .pass-wrapper .ojito:hover { color: #6c5ce7; }

        #loadingEl {
            display: none; text-align: center;
            padding: 20px 0; color: #6c5ce7; font-size: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🌎</div>
    <div class="titulo">Globo Argento</div>
    <div class="subtitulo">Iniciá sesión para jugar</div>

    <div id="loadingEl">Verificando sesión... ⏳</div>

    <!-- PANTALLA 1: Método -->
    <div class="pantalla activa" id="p-metodo">
        <button class="btn btn-morado" id="btnIrEmail" style="margin-bottom:10px;">📧 Ingresar con Email</button>

        <div class="sep">o jugá sin cuenta</div>

        <input type="text" id="inputSinCuenta" placeholder="Nombre para jugar (3-20 caracteres)" maxlength="20">
        <button class="btn btn-gris" id="btnSinCuenta">Jugar sin cuenta</button>
        <p class="msg-aviso">⚠️ Sin cuenta los puntos no aparecen en el ranking</p>
        <p class="msg-error" id="msgMetodo"></p>
    </div>

    <!-- PANTALLA 2: Email / Contraseña -->
    <div class="pantalla" id="p-email">
        <h3 id="tituloEmail" style="text-align:center; margin-bottom:14px; color:#1a1a2e;">Iniciar sesión</h3>

        <input type="email" id="inputEmail" placeholder="Email">

        <div class="pass-wrapper" id="wrapperPass1">
            <input type="password" id="inputPassword" placeholder="Contraseña">
            <button class="ojito" type="button" onclick="togglePass('inputPassword', this)">👁️</button>
        </div>

        <div class="pass-wrapper" id="wrapperPass2" style="display:none;">
            <input type="password" id="inputPassword2" placeholder="Repetir contraseña">
            <button class="ojito" type="button" onclick="togglePass('inputPassword2', this)">👁️</button>
        </div>

        <button class="btn btn-morado" id="btnAccion">Ingresar</button>
        <button class="link" id="btnToggle">¿No tenés cuenta? Registrate</button>
        <button class="link" id="btnOlvide" style="color:#aaa;">¿Olvidaste tu contraseña?</button>
        <button class="link link-volver" id="btnVolverMetodo">← Volver</button>

        <p class="msg-error" id="msgEmail"></p>
        <p class="msg-ok"    id="msgEmailOk"></p>
    </div>

    <!-- PANTALLA 3: Nombre de perfil (primera vez) -->
    <div class="pantalla" id="p-nombre">
        <h3 style="text-align:center; margin-bottom:8px; color:#1a1a2e;">Elegí tu nombre 🎮</h3>
        <p style="text-align:center; font-size:13px; color:#888; margin-bottom:16px;">
            Este nombre es único y aparecerá en el ranking.
        </p>
        <input type="text" id="inputNombre" placeholder="Nombre (3-20 caracteres, sin espacios)" maxlength="20">
        <button class="btn btn-morado" id="btnGuardarNombre">Confirmar nombre</button>
        <p class="msg-error" id="msgNombre"></p>
    </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
    "https://tapctytjeknttbmoqflx.supabase.co",
    "sb_publishable_vre912nf_gM7sSk6lgzBZQ_sgUIAwlP",
    { auth: { flowType:'pkce', persistSession:true, detectSessionInUrl:true, storage:window.localStorage } }
);

function mostrar(id) {
    document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("activa"));
    document.getElementById(id).classList.add("activa");
}

function validarNombre(n) { return /^[A-Za-z0-9_]{3,20}$/.test(n); }

async function obtenerPerfil(userId) {
    const { data } = await sb.from("Perfiles").select("nombre_usuario, monedas").eq("id", userId).single();
    return data || null;
}

function irAlJuego() { window.location.href = "index.html"; }

async function manejarSesion(session) {
    document.getElementById("loadingEl").style.display = "block";
    document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("activa"));

    const perfil = await obtenerPerfil(session.user.id);
    document.getElementById("loadingEl").style.display = "none";

    if (perfil?.nombre_usuario) {
        localStorage.setItem("usuario", perfil.nombre_usuario);
        localStorage.setItem("usuarioId", session.user.id);
        localStorage.removeItem("sinCuenta");
        irAlJuego();
    } else {
        mostrar("p-nombre");
    }
}

// Guardar nombre de perfil
document.getElementById("btnGuardarNombre").addEventListener("click", async () => {
    const nombre = document.getElementById("inputNombre").value.trim();
    const msgEl  = document.getElementById("msgNombre");
    msgEl.textContent = "";

    if (!validarNombre(nombre)) {
        msgEl.textContent = "3-20 caracteres, solo letras, números y guión bajo (_).";
        return;
    }

    const { data: existente } = await sb.from("Perfiles").select("id").eq("nombre_usuario", nombre).single();
    if (existente) { msgEl.textContent = "Ese nombre ya está en uso. Elegí otro."; return; }

    const { data: { session } } = await sb.auth.getSession();
    if (!session) { msgEl.textContent = "Sesión expirada. Recargá la página."; return; }

    const { error } = await sb.from("Perfiles").insert({
        id: session.user.id,
        nombre_usuario: nombre,
        monedas: 0
    });
    if (error) { msgEl.textContent = "Error al guardar. Intentá de nuevo."; console.error(error); return; }

    localStorage.setItem("usuario", nombre);
    localStorage.setItem("usuarioId", session.user.id);
    localStorage.removeItem("sinCuenta");
    irAlJuego();
});

// Email
document.getElementById("btnIrEmail").addEventListener("click", () => {
    modoRegistro = false; actualizarModo(); mostrar("p-email");
});
document.getElementById("btnVolverMetodo").addEventListener("click", () => mostrar("p-metodo"));

let modoRegistro = false;
document.getElementById("btnToggle").addEventListener("click", () => {
    modoRegistro = !modoRegistro; actualizarModo();
});

function actualizarModo() {
    document.getElementById("tituloEmail").textContent      = modoRegistro ? "Crear cuenta"   : "Iniciar sesión";
    document.getElementById("btnAccion").textContent        = modoRegistro ? "Registrarme"    : "Ingresar";
    document.getElementById("wrapperPass2").style.display  = modoRegistro ? "block"           : "none";
    document.getElementById("btnToggle").textContent        = modoRegistro ? "¿Ya tenés cuenta? Iniciá sesión" : "¿No tenés cuenta? Registrate";
    document.getElementById("btnOlvide").style.display      = modoRegistro ? "none"            : "block";
    document.getElementById("msgEmail").textContent         = "";
    document.getElementById("msgEmailOk").textContent       = "";
}

document.getElementById("btnAccion").addEventListener("click", async () => {
    const email    = document.getElementById("inputEmail").value.trim();
    const password = document.getElementById("inputPassword").value;
    const password2= document.getElementById("inputPassword2").value;
    const msgEl    = document.getElementById("msgEmail");
    const msgOkEl  = document.getElementById("msgEmailOk");
    msgEl.textContent = ""; msgOkEl.textContent = "";

    if (!email || !password) { msgEl.textContent = "Completá todos los campos."; return; }

    if (modoRegistro) {
        if (password.length < 6)    { msgEl.textContent = "La contraseña debe tener al menos 6 caracteres."; return; }
        if (password !== password2) { msgEl.textContent = "Las contraseñas no coinciden."; return; }
        const { error } = await sb.auth.signUp({
            email, password,
            options: { emailRedirectTo: "https://globoargento.github.io/GloboArgentoV1/login.html" }
        });
        if (error) { msgEl.textContent = "Error: " + error.message; return; }
        msgOkEl.textContent = "✅ Cuenta creada. Revisá tu email para confirmarla y luego iniciá sesión.";
    } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { msgEl.textContent = "Email o contraseña incorrectos."; return; }
    }
});

document.getElementById("btnOlvide").addEventListener("click", async () => {
    const email   = document.getElementById("inputEmail").value.trim();
    const msgEl   = document.getElementById("msgEmail");
    const msgOkEl = document.getElementById("msgEmailOk");
    msgEl.textContent = ""; msgOkEl.textContent = "";
    if (!email) { msgEl.textContent = "Ingresá tu email arriba primero."; return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: "https://globoargento.github.io/GloboArgentoV1/login.html"
    });
    if (error) { msgEl.textContent = "Error: " + error.message; return; }
    msgOkEl.textContent = "✅ Te enviamos un email para recuperar tu contraseña.";
});

// Sin cuenta
document.getElementById("btnSinCuenta").addEventListener("click", () => {
    const nombre = document.getElementById("inputSinCuenta").value.trim();
    const msgEl  = document.getElementById("msgMetodo");
    if (!validarNombre(nombre)) { msgEl.textContent = "El nombre debe tener 3-20 caracteres sin espacios."; return; }
    localStorage.setItem("usuario", nombre);
    localStorage.setItem("sinCuenta", "true");
    localStorage.removeItem("usuarioId");
    irAlJuego();
});

function togglePass(inputId, btn) {
    const input = document.getElementById(inputId);
    input.type = input.type === "password" ? "text" : "password";
    btn.textContent = input.type === "password" ? "👁️" : "🙈";
}

sb.auth.onAuthStateChange(async (event, session) => {
    const url = new URL(window.location.href);
    if (url.searchParams.has('code') || url.searchParams.has('error')) {
        url.search = ''; url.hash = '';
        window.history.replaceState({}, document.title, url.toString());
    }
    if (event === 'INITIAL_SESSION') return;
    if (event === 'SIGNED_IN' && session?.user) await manejarSesion(session);
});

async function inicializar() {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) { await manejarSesion(session); return; }
    mostrar("p-metodo");
}
inicializar();
</script>
</body>
</html>
