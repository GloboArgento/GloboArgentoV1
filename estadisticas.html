<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas Generales - Juego de Banderas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .estadisticas-container {
            width: 300px;
            margin: 50px auto;
            background: white;
            padding: 25px 35px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
        }
        .estadisticas-container h2 { margin-bottom: 20px; }
        .estadisticas-container p { font-size: 18px; margin: 10px 0; }
        #botonReiniciar {
            padding: 10px 20px;
            font-size: 18px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(1);   }
            50%  { transform: scale(1.1); }
            100% { transform: scale(1);   }
        }
        #monedaDiv {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,215,0,0.9); color: #000;
            padding: 8px 14px; border-radius: 20px;
            font-weight: bold; font-size: 16px; z-index: 1000;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        #monedaDiv.monedaAnim { transform: scale(1.3); }
        #mensajeMoneda {
            position: fixed; top: 70px; right: 20px;
            background: rgba(255,215,0,0.9); color: #000;
            padding: 8px 14px; border-radius: 20px;
            font-weight: bold; font-size: 16px;
            opacity: 0; transition: opacity 0.3s; z-index: 1001;
        }
    </style>
</head>
<body>
    <h1>Estadísticas Generales 🌍</h1>

    <div class="estadisticas-container">
        <h2>Totales</h2>
        <p>Partidas jugadas: <span id="totalPartidas">0</span></p>
        <p>Aciertos: <span id="totalAciertos">0</span></p>
        <p>Fallos: <span id="totalFallos">0</span></p>
        <p>Desafíos ganados: <span id="totalDesafios">0</span></p>
        <p>Efectividad: <span id="efectividadGeneral">0%</span></p>
        <button id="botonReiniciar">Reiniciar Estadísticas (100 🪙)</button>
    </div>

    <div style="text-align:center;">
        <a href="index.html" class="boton-menu">Volver al menú</a>
    </div>

    <div id="mensajeMoneda"></div>

    <script>
        // ========================== SUPABASE ==========================
        const { createClient } = supabase;
        const supabaseClient = createClient(
            "https://tapctytjeknttbmoqflx.supabase.co",
            "sb_publishable_vre912nf_gM7sSk6lgzBZQ_sgUIAwlP",
            {
                auth: {
                    flowType: 'pkce',
                    persistSession: true,
                    detectSessionInUrl: true,
                    storage: window.localStorage
                }
            }
        );

        // ========================== USUARIO ==========================
        async function obtenerNombreUsuario() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session?.user) {
                return session.user.user_metadata?.full_name
                    || session.user.user_metadata?.name
                    || session.user.email?.split("@")[0]
                    || "Anónimo";
            }
            return localStorage.getItem("usuario") || "Anónimo";
        }

        // ========================== ESTADÍSTICAS ==========================
        let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [{ totalPartidas:0,totalAciertos:0,totalFallos:0,totalDesafios:0 }];
        let u = usuarios[0];

        let monedas = parseInt(localStorage.getItem('monedas')) || 0;

        const monedaDiv = document.createElement("div");
        monedaDiv.id = "monedaDiv";
        monedaDiv.innerHTML = `🪙 <span id="cantidadMonedas">${monedas}</span>`;
        document.body.appendChild(monedaDiv);

        const mensajeMoneda = document.getElementById("mensajeMoneda");

        function mostrarMensaje(msg) {
            mensajeMoneda.textContent = msg;
            mensajeMoneda.style.opacity = "1";
            setTimeout(() => mensajeMoneda.style.opacity = "0", 2500);
        }

        function actualizarMonedasDisplay(animar = true) {
            document.getElementById("cantidadMonedas").textContent = monedas;
            if (animar) {
                monedaDiv.classList.add("monedaAnim");
                setTimeout(() => monedaDiv.classList.remove("monedaAnim"), 500);
            }
        }

        function gastarMonedas(cantidad) {
            if (monedas >= cantidad) {
                monedas -= cantidad;
                localStorage.setItem('monedas', monedas);
                actualizarMonedasDisplay();
                return true;
            } else {
                mostrarMensaje("No tenés suficientes monedas 🪙");
                return false;
            }
        }

        function actualizarEstadisticas() {
            const totalAciertos = u.totalAciertos;
            const totalFallos   = u.totalFallos;
            const efectividad   = (totalAciertos + totalFallos > 0)
                ? Math.round(totalAciertos / (totalAciertos + totalFallos) * 100) : 0;

            document.getElementById('totalPartidas').textContent  = u.totalPartidas;
            document.getElementById('totalAciertos').textContent  = totalAciertos;
            document.getElementById('totalFallos').textContent    = totalFallos;
            document.getElementById('totalDesafios').textContent  = u.totalDesafios || 0;
            document.getElementById('efectividadGeneral').textContent = efectividad + '%';
        }

        actualizarEstadisticas();
        actualizarMonedasDisplay(false);

        // ========================== REINICIAR ==========================
        document.getElementById('botonReiniciar').addEventListener('click', async () => {
            if (!gastarMonedas(100)) return;

            // 1. Limpiar localStorage
            u.totalPartidas = 0;
            u.totalAciertos = 0;
            u.totalFallos   = 0;
            u.totalDesafios = 0;
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            actualizarEstadisticas();

            // 2. Borrar del Ranking en Supabase
            const nombreUsuario = await obtenerNombreUsuario();
            const { error } = await supabaseClient
                .from("Ranking")
                .delete()
                .eq("usuario", nombreUsuario);

            if (error) {
                console.error("Error borrando del ranking:", error.message);
                mostrarMensaje("Estadísticas locales reiniciadas ✅ (error al limpiar ranking)");
            } else {
                mostrarMensaje("¡Estadísticas y ranking reiniciados! ✅");
            }
        });
    </script>
</body>
</html>
